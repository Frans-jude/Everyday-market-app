<form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

  <h2>Registration Form</h2>

  <div class="form-group">
    <label for="name">Name</label>
    <input
      id="name"
      type="text"
      formControlName="name"
      [class.invalid]="registerForm.get('name')?.touched && registerForm.get('name')?.invalid"
    />
  </div>

  <div class="form-group">
    <label for="email">Email Address</label>
    <input
      id="email"
      type="email"
      formControlName="email"
      [class.invalid]="registerForm.get('email')?.touched && registerForm.get('email')?.invalid"
    />
  </div>

  <div class="form-group">
    <label for="phone">Phone Number</label>
    <input
      id="phone"
      type="text"
      formControlName="phone"
      [class.invalid]="registerForm.get('phone')?.touched && registerForm.get('phone')?.invalid"
    />
  </div>

  <div class="form-group">
    <label for="dateOfBirth">Date of Birth</label>
    <input
      id="dateOfBirth"
      type="date"
      formControlName="dateOfBirth"
      [class.invalid]="registerForm.get('dateOfBirth')?.touched && registerForm.get('dateOfBirth')?.invalid"
    />
  </div>

  <div class="form-group">
    <label for="streetAddress">Street Address</label>
    <input
      id="streetAddress"
      type="text"
      formControlName="streetAddress"
      [class.invalid]="registerForm.get('streetAddress')?.touched && registerForm.get('streetAddress')?.invalid"
    />
  </div>

  <div class="form-group">
    <label for="province">Province</label>
    <select
      id="province"
      formControlName="province"
      [class.invalid]="registerForm.get('province')?.touched && registerForm.get('province')?.invalid"
    >
      <option value="">Select Province</option>
      <option>Alberta</option>
      <option>British Columbia</option>
      <option>Manitoba</option>
      <option>New Brunswick</option>
      <option>Newfoundland and Labrador</option>
      <option>Nova Scotia</option>
      <option>Ontario</option>
      <option>Prince Edward Island</option>
      <option>Quebec</option>
      <option>Saskatchewan</option>
    </select>
  </div>

  <div class="form-group">
    <label for="country">Country</label>
    <select
      id="country"
      formControlName="country"
      [class.invalid]="registerForm.get('country')?.touched && registerForm.get('country')?.invalid"
    >
      <option value="">Select Country</option>
      <option>Canada</option>
      <option>United States</option>
    </select>
  </div>

  <label class="terms" for="terms">
    <input
      id="terms"
      type="checkbox"
      formControlName="terms"
    />
    I accept the Terms & Conditions
  </label>

  <button
    type="submit"
    [disabled]="registerForm.invalid || registerForm.value.country !== 'Canada'"
  >
    Submit
  </button>

</form>
